<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome | Campus Community Hub</title>
  <link rel="stylesheet" href="m.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }

    /* ── Floating sticker layer ── */
    .sticker-layer {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .sticker {
      position: absolute;
      font-size: 2rem;
      animation: floatSticker linear infinite;
      opacity: 0.55;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.35));
      user-select: none;
    }
    @keyframes floatSticker {
      0%   { transform: translateY(100vh) rotate(0deg) scale(0.8); opacity: 0; }
      10%  { opacity: 0.55; }
      90%  { opacity: 0.45; }
      100% { transform: translateY(-120px) rotate(360deg) scale(1.1); opacity: 0; }
    }

    /* ── Animated photo bubbles ── */
    .photo-bubble {
      position: fixed;
      border-radius: 50%;
      border: 2px solid rgba(124,111,255,0.3);
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(6px);
      animation: bubbleDrift ease-in-out infinite;
    }
    @keyframes bubbleDrift {
      0%,100% { transform: translateY(0) scale(1); opacity: 0.45; }
      50%      { transform: translateY(-20px) scale(1.05); opacity: 0.65; }
    }

    /* ── Splash content ── */
    .splash-wrap {
      text-align: center;
      z-index: 10;
      padding: 40px 20px;
      animation: containerReveal 1s var(--ease-out) both;
      position: relative;
    }
    .splash-logo {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin: 0 auto 28px;
      box-shadow: 0 0 0 4px rgba(124,111,255,0.25), 0 0 50px -10px var(--secondary-glow);
      animation: logoBounce 2.5s ease-in-out infinite;
    }
    @keyframes logoBounce {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50%      { transform: translateY(-8px) rotate(3deg); }
    }
    .splash-tag {
      display: inline-block;
      font-family: var(--font-heading);
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--accent);
      background: rgba(0,229,192,0.12);
      border: 1px solid rgba(0,229,192,0.25);
      padding: 5px 16px;
      border-radius: 50px;
      margin-bottom: 22px;
    }
    .splash-hero-title {
      font-family: var(--font-heading);
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 20%, var(--secondary) 55%, var(--primary) 90%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmerText 5s linear infinite;
      margin-bottom: 18px;
      max-width: 600px;
    }
    .splash-sub {
      font-size: 1.1rem;
      color: var(--text-sub);
      max-width: 420px;
      margin: 0 auto 38px;
      line-height: 1.6;
    }
    .splash-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      color: #fff;
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1rem;
      padding: 16px 42px;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 8px 30px -6px var(--secondary-glow);
      transition: var(--transition);
      position: relative; overflow: hidden;
      letter-spacing: 0.03em;
    }
    .splash-cta:hover {
      transform: translateY(-4px) scale(1.04);
      box-shadow: 0 16px 40px -8px var(--secondary-glow);
      color: #fff;
    }
    .splash-cta::after {
      content: '';
      position: absolute;
      top: 0; left: -120%; width: 60%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.25), transparent);
      transform: skewX(-20deg);
      transition: 0.7s var(--ease-out);
    }
    .splash-cta:hover::after { left: 130%; }
    .splash-features {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 46px;
      max-width: 560px;
      margin-left: auto; margin-right: auto;
    }
    .splash-feat {
      display: flex; align-items: center; gap: 7px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 7px 16px;
      font-size: 0.82rem;
      color: var(--text-sub);
      font-family: var(--font-heading);
      font-weight: 600;
      transition: var(--transition);
    }
    .splash-feat:hover {
      border-color: var(--secondary);
      color: var(--text-main);
      background: rgba(124,111,255,0.10);
    }
  </style>
</head>
<body>

  <!-- Animated background stickers -->
  <div class="sticker-layer" id="stickerLayer"></div>

  <!-- Floating photo bubbles with study themes -->
  <div class="photo-bubble" style="width:90px;height:90px;top:8%;left:5%;animation-duration:7s;animation-delay:0s;">📖</div>
  <div class="photo-bubble" style="width:70px;height:70px;top:15%;right:8%;animation-duration:9s;animation-delay:1s;">🎓</div>
  <div class="photo-bubble" style="width:80px;height:80px;top:72%;left:3%;animation-duration:8s;animation-delay:2s;">✏️</div>
  <div class="photo-bubble" style="width:60px;height:60px;top:75%;right:5%;animation-duration:11s;animation-delay:0.5s;">🔬</div>
  <div class="photo-bubble" style="width:75px;height:75px;top:42%;left:2%;animation-duration:10s;animation-delay:3s;">💡</div>
  <div class="photo-bubble" style="width:65px;height:65px;top:38%;right:3%;animation-duration:8.5s;animation-delay:1.5s;">🧠</div>
  <div class="photo-bubble" style="width:55px;height:55px;top:88%;left:18%;animation-duration:12s;animation-delay:4s;">🖊️</div>
  <div class="photo-bubble" style="width:55px;height:55px;top:5%;left:40%;animation-duration:13s;animation-delay:2s;">📐</div>

  <div class="splash-wrap">
    <div class="splash-logo">🎓</div>
    <div class="splash-tag">✦ Your Campus, Your Community</div>
    <h1 class="splash-hero-title" data-text="Campus Community Hub">Campus Community Hub</h1>
    <p class="splash-sub">Your all-in-one digital campus — connect, collaborate, and grow with your peers.</p>

    <a href="home.html" class="splash-cta">
      Enter Campus Hub &nbsp;→
    </a>

    <div class="splash-features">
      <span class="splash-feat">📘 Notes</span>
      <span class="splash-feat">🎉 Events</span>
      <span class="splash-feat">🩸 Blood Donation</span>
      <span class="splash-feat">📚 Book Exchange</span>
      <span class="splash-feat">🔎 Lost & Found</span>
      <span class="splash-feat">👩‍🏫 Teachers</span>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // Generate floating stickers
    const stickers = ['📚','✏️','📝','🎓','💻','🔬','📐','📏','🧪','💡','📓','🖊️','🧮','📊','🗒️','🎯','🌟','⭐','🏆','🎨','🔭','🧬','📡','⚗️','🖥️'];
    const layer = document.getElementById('stickerLayer');
    for (let i = 0; i < 18; i++) {
      const el = document.createElement('div');
      el.className = 'sticker';
      el.textContent = stickers[Math.floor(Math.random() * stickers.length)];
      el.style.left = Math.random() * 100 + '%';
      el.style.fontSize = (1.2 + Math.random() * 1.8) + 'rem';
      el.style.animationDuration = (12 + Math.random() * 14) + 's';
      el.style.animationDelay = (Math.random() * 12) + 's';
      layer.appendChild(el);
    }
  </script>
</body>
</html>
